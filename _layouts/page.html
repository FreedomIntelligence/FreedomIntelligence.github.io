---
layout: default
---
<!-- page.html -->
        <div class="post">

          <header class="post-header">
            <h1 class="post-title">
              {%- if page.title_zh -%}
              <span data-lang="en">{{ page.title }}</span><span data-lang="zh">{{ page.title_zh }}</span>
              {%- else -%}
              {{ page.title }}
              {%- endif -%}
            </h1>
            <p class="post-description">
              {%- if page.description_zh -%}
              <span data-lang="en">{{ page.description }}</span><span data-lang="zh">{{ page.description_zh }}</span>
              {%- else -%}
              {{ page.description }}
              {%- endif -%}
            </p>
          </header>

          <article>
            {{ content }}
          </article>

        </div>
